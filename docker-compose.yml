version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: lid-crm-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - lid-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lid-crm-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:password123@mongo:27017/lid-crm?authSource=admin
      - JWT_SECRET=your_jwt_secret_key_change_in_production
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - lid-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lid-crm-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - lid-network

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: lid-crm-admin
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    networks:
      - lid-network

volumes:
  mongo_data:

networks:
  lid-network:
    driver: bridge
