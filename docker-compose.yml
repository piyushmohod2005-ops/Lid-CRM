version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: pitami-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - pitami-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitami-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password123@mongo:27017/pitami?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production_12345
      - JWT_EXPIRE=7d
      - API_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:3001
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pitami-network
    restart: unless-stopped
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pitami-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_STRIPE_PUBLIC_KEY=pk_test_your_key
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pitami-network
    restart: unless-stopped

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: pitami-admin
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    networks:
      - pitami-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  pitami-network:
    driver: bridge
